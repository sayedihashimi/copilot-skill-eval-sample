# Skill Evaluation CI Workflow
# Generated by: skill-eval ci-setup
# Re-run `skill-eval ci-setup` to update this workflow.

name: Skill Evaluation

on:
  workflow_dispatch:
    inputs:
      skip_generate:
        description: "Skip the code generation step"
        type: boolean
        default: false
      skip_verify:
        description: "Skip the verification step"
        type: boolean
        default: false
      analyze_only:
        description: "Only run the analysis step"
        type: boolean
        default: false


jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub Copilot CLI
        run: curl -fsSL https://gh.io/copilot-install | bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skill-eval
        run: pip install git+https://github.com/sayedihashimi/copilot-skill-eval@2026.04-externalskills

      - name: Validate configuration
        run: |
          skill-eval \
            --config eval.yaml \
            --skill-sources skill-sources.yaml \
            validate-config

      - name: Run evaluation pipeline
        run: |
          ARGS=""
          if [ "${{ inputs.skip_generate }}" = "true" ]; then
            ARGS="$ARGS --skip-generate"
          fi
          if [ "${{ inputs.skip_verify }}" = "true" ]; then
            ARGS="$ARGS --skip-verify"
          fi
          if [ "${{ inputs.analyze_only }}" = "true" ]; then
            ARGS="$ARGS --analyze-only"
          fi
          skill-eval \
            --config eval.yaml \
            --skill-sources skill-sources.yaml \
            run $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: reports/

      - name: Upload generated output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-output
          path: output/
